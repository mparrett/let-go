name: Perf Timeline

on:
  push:
    branches: [main]
    # Skip commits that cannot change measured performance: a docs-only
    # commit has byte-identical code to its parent, so its snapshot would
    # cost a full bench run (~65 min/leg) to record the parent's numbers
    # under a new sha. The timeline tolerates the gap — the explorer plots
    # by commit time, and backfill can densify any range on demand.
    paths-ignore:
      - 'docs/**'
      - '**.md'
  # Manual backfill: dispatch once per historical commit to fill the timeline
  # gap. Snapshot identity is derived from the checked-out HEAD (name, sha,
  # commit time), so the rest of the job is already commit-agnostic.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA/ref to snapshot (backfill)'
        required: true
        default: 'main'

permissions:
  contents: write

# Concurrency lives at the JOB level, one group per runner OS — see below.
# A single workflow-level group serialized the two legs behind each other,
# and macos-14 runner starvation then dammed the whole queue: one run's
# macos leg sat queued for >24h (GitHub cancels it there), while every
# newer run — including cheap, instantly-runnable ubuntu legs — waited
# FIFO behind it. Per-OS groups let the amd64 timeline advance at ubuntu
# speed no matter what the macos runner pool is doing.

jobs:
  profile:
    if: github.actor != 'github-actions[bot]'
    strategy:
      fail-fast: false
      matrix:
        # amd64 (GitHub Linux runner) + Apple-Silicon arm64 (macos-14). With
        # the machine-profile-partitioned ratchet these coexist cleanly; the
        # explorer then shows both an amd64 and an Apple-M line per benchmark.
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    # The macos-14 leg needs more headroom: at count 3 the ubuntu leg fits
    # in 61-83 min, but no macos leg has ever finished under 90 — every one
    # since the leg landed (#363) died at the kill, so perf-data has zero
    # arm64 snapshots. Measured envelope: a completed fork probe leg ran
    # 120 min end to end (118.6 min in the capture step) at count 3, so
    # 150 gives ~25% headroom — proportionally more than ubuntu's 90 over
    # its 83-min worst case. Evidence + discussion: #573.
    timeout-minutes: ${{ matrix.os == 'macos-14' && 150 || 90 }}
    concurrency:
      # Per-OS FIFO queue: legs of the same OS stay serialized (snapshot
      # commits land in commit order), but the two OSes never wait on each
      # other. The cross-leg perf-data push race this reintroduces is
      # handled by the fetch/rebase/retry loop in the publish step.
      group: perf-timeline-${{ matrix.os }}
      cancel-in-progress: false
      # Retain every queued job (FIFO, up to 100) instead of the default
      # queue: single, which keeps only the latest pending one. The backfill
      # dispatches one run per historical commit; under queue: single all but
      # the last would supersede each other and be canceled.
      queue: max
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check out target ref
        env:
          TARGET_REF: ${{ github.event.inputs.ref || github.sha }}
        run: |
          # actions/checkout only treats a *full* 40-char SHA as a commit; a
          # short SHA is read as a branch/tag name and fails ("a branch or tag
          # with the name '<sha>' could not be found"). Resolve here instead —
          # fetch-depth:0 already pulled every branch and tag, so any committish
          # (short SHA, full SHA, branch, tag) resolves locally.
          git checkout --force "$TARGET_REF"
          git submodule update --init --recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate lowered runtime (best-effort)
        # Tags before v1.10 have no `lowered` target. Skip it there rather than
        # fail — the tag's own bench-ratchet then captures its available
        # (bytecode) benches, so e.g. v1.9 gets a bytecode-only snapshot with no
        # gogen_ir/aot_native variants. That's intended (no lowered comparison
        # for pre-v1.10 releases).
        run: make lowered || echo "no 'lowered' target at this ref — skipping; gogen_ir/aot_native variants will be absent"

      - name: Capture full perf snapshot
        id: perf
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          commit_epoch="$(git show -s --format=%ct HEAD)"
          # GNU date (Linux) uses -d @epoch; BSD date (macOS) uses -r epoch.
          stamp="$(date -u -r "${commit_epoch}" +%Y%m%dT%H%M%SZ 2>/dev/null || date -u -d "@${commit_epoch}" +%Y%m%dT%H%M%SZ)"
          # Tag the filename with the canonical machine key ("<arch>-<cpumodel>")
          # so snapshots of the SAME commit from different machine classes never
          # collide on one name. `uname -m` alone is NOT enough: Apple M1 and M2
          # (and future arm parts) all report `arm64`, so an arm-only key would
          # let an M2 run overwrite an M1 run — and vice-versa — for a commit.
          # bench-ratchet derives the token from the same <arch>/<CPUModel> the
          # timeline partitions on (arch = GOARCH, model via sysctl / cpuinfo),
          # keeping the filename dimension in lockstep with the snapshot content.
          machine_key="$(go run ./cmd/bench-ratchet machine-key 2>/dev/null || true)"
          if [ -z "${machine_key}" ]; then
            # Backfill checks out old release tags whose bench-ratchet predates
            # the `machine-key` subcommand. Derive the same slug in shell so
            # backfilled snapshots stay collision-safe across machine classes.
            arch="$(go env GOARCH)"
            if [ "$(uname -s)" = "Darwin" ]; then
              model="$(sysctl -n machdep.cpu.brand_string 2>/dev/null || echo)"
            else
              model="$(sed -n 's/^model name[[:space:]]*:[[:space:]]*//p' /proc/cpuinfo 2>/dev/null | head -1)"
            fi
            machine_key="$(printf '%s-%s' "${arch}" "${model}" \
              | tr 'A-Z' 'a-z' | tr -c 'a-z0-9' '-' | sed -E 's/-+/-/g; s/^-+//; s/-+$//')"
            [ -n "${machine_key}" ] || machine_key="unknown"
          fi
          snapshot_name="${stamp}-${short_sha}-${machine_key}.json"
          snapshot_tmp="${RUNNER_TEMP}/${snapshot_name}"
          raw_tmp="${RUNNER_TEMP}/${snapshot_name%.json}.jsonl"

          # -count 3: a count-4 ubuntu leg measured 103.9 min end to end
          # (pkg/vm bench alone ~97 min), past timeout-minutes: 90 — every
          # timeline leg would die at the kill. Count 3 keeps the leg in the
          # measured ~65-min envelope. Note for the #561 sampling rework:
          # count 3 lands in reduceSamples' discard-warmup-then-average-of-2
          # branch there; the estimator question lives on that PR.
          go run ./cmd/bench-ratchet \
            -full \
            -count 3 \
            -benchtime 2s \
            -timeout 30m \
            -out "${raw_tmp}" \
            -baseline "${snapshot_tmp}" \
            snapshot
          # The committed snapshot embeds the per-run samples from raw_tmp.

          echo "snapshot_name=${snapshot_name}" >> "${GITHUB_OUTPUT}"
          echo "snapshot_tmp=${snapshot_tmp}" >> "${GITHUB_OUTPUT}"

      # Timeline snapshots are append-only data, NOT source. Publishing them
      # to main would (a) be rejected by branch protection ("changes must go
      # through a PR") and (b) bloat main with a multi-thousand-line JSON per
      # commit. Instead we push to a dedicated, unprotected `perf-data` branch
      # holding only docs/perf/timeline/*.json. The live "Are we fast yet?"
      # page (pages.yml) reads the timeline from this branch at deploy time.
      - name: Publish snapshot to perf-data branch
        run: |
          set -euo pipefail
          snapshot_tmp="${{ steps.perf.outputs.snapshot_tmp }}"
          snapshot_name="${{ steps.perf.outputs.snapshot_name }}"
          remote="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          wt="${RUNNER_TEMP}/perf-data"

          if git ls-remote --exit-code --heads "$remote" perf-data >/dev/null 2>&1; then
            git clone --depth 1 --branch perf-data "$remote" "$wt"
          else
            # First run: create the orphan branch with no history/files.
            git clone --depth 1 "$remote" "$wt"
            git -C "$wt" checkout --orphan perf-data
            git -C "$wt" rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "$wt/timeline"
          cp "$snapshot_tmp" "$wt/timeline/$snapshot_name"

          git -C "$wt" config user.name "github-actions[bot]"
          git -C "$wt" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$wt" add timeline
          if git -C "$wt" diff --cached --quiet; then
            echo "No perf changes to commit."
            exit 0
          fi
          # Name the snapshot's own commit, not the dispatch ref (under
          # workflow_dispatch github.sha is the branch tip, not the backfilled
          # commit). snapshot_name embeds the correct short sha + commit time.
          git -C "$wt" commit -m "perf: record timeline snapshot ${snapshot_name}"
          # The two OS legs run in independent concurrency groups (see the
          # profile job), so their pushes can race on the branch ref. Each
          # leg adds a distinct file (the machine key is in the filename),
          # so a rebase always replays cleanly — retry a few times and give
          # the ref a moment to settle between attempts.
          for attempt in 1 2 3 4 5; do
            if git -C "$wt" push "$remote" HEAD:perf-data; then
              exit 0
            fi
            echo "push rejected (attempt ${attempt}) — rebasing on remote perf-data"
            sleep $((attempt * 5))
            git -C "$wt" fetch "$remote" perf-data
            git -C "$wt" rebase FETCH_HEAD
          done
          echo "failed to push snapshot after 5 attempts" >&2
          exit 1

version: 2

project_name: let-go

before:
  hooks:
    - go mod tidy
    - go test -timeout 60s ./...

builds:
  - id: unix
    main: .
    binary: lg
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  # Plan 9 / 9front. Go's plan9 port supports 386, amd64, and arm (32-bit).
  # No arm64 target exists upstream.
  - id: plan9
    main: .
    binary: lg
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    env:
      - CGO_ENABLED=0
    goos:
      - plan9
    goarch:
      - amd64
      - arm

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

# brews:
#   Disabled for now — branch protection blocks direct push,
#   and PR mode needs a PAT. Formula is maintained manually
#   in HomebrewFormula/let-go.rb
